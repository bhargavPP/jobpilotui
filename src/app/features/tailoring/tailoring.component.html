<div class="tailoring-page">

  <!-- Left Panel -->

  <aside class="left-panel">

    <app-tailoring-form [companyName]="companyName"
                        [jobTitle]="jobTitle"
                        [jobUrl]="jobUrl"
                        [jobDescription]="jobDescription"
                        [loading]="loading"
                        (companyNameChange)="companyName = $event"
                        (jobTitleChange)="jobTitle = $event"
                        (jobUrlChange)="jobUrl = $event"
                        (jobDescriptionChange)="jobDescription = $event"
                        (tailor)="tailorResume()">
    </app-tailoring-form>

  </aside>

  <!-- Right Panel -->

  <section class="right-panel">

    <!-- Loading -->

    <div class="loading-container"
         *ngIf="loading">

      <div class="loading-card">

        <div class="spinner"></div>

        <h2>AI is tailoring your resume</h2>

        <p class="loading-message">

          {{ loadingMessage }}

        </p>

        <div class="progress">

          <div class="progress-fill"
               [style.width.%]="progress">
          </div>

        </div>

        <div class="progress-value">

          {{ progress }}%

        </div>

        <div class="steps">

          <div *ngFor="let step of loadingSteps; let i = index"
               class="step">

            <span class="icon">

              <ng-container *ngIf="i < currentStep">

                ✅

              </ng-container>

              <ng-container *ngIf="i === currentStep">

                ⏳

              </ng-container>

              <ng-container *ngIf="i > currentStep">

                ⚪

              </ng-container>

            </span>

            <span [class.active]="i <= currentStep">

              {{ step }}

            </span>

          </div>

        </div>

      </div>

    </div>

    <!-- Placeholder -->

    <div class="placeholder"
         *ngIf="!loading && !result">

      <div class="placeholder-card">

        <h1>

          AI Resume Tailoring

        </h1>

        <p>

          Paste a job description on the left and let
          JobPilot generate an ATS-optimized resume,
          personalized professional summary,
          recommendations and a tailored cover letter.

        </p>

      </div>

    </div>

    <!-- Results -->

    <div class="results"
         *ngIf="!loading && result as resume">

      <!-- Scores -->

      <div class="score-grid">

        <app-score-card title="Resume Match"
                        [value]="resume.matchScore">
        </app-score-card>

        <app-score-card title="ATS Score"
                        [value]="resume.atsScore.score">
        </app-score-card>

      </div>

      <!-- Summary -->

      <app-summary-card [summary]="resume.tailoredSummary">
      </app-summary-card>

      <!-- Resume -->

      <app-resume-preview [result]="resume">
      </app-resume-preview>

      <!-- Skills -->

      <app-skills-card [skills]="resume.skills"
                       [requiredSkills]="resume.extraction.requiredSkills"
                       [niceToHave]="resume.extraction.niceToHave"
                       [keywords]="resume.extraction.keywords"
                       [missingSkills]="resume.missingSkills">

      </app-skills-card>

      <!-- Recommendations -->

      <app-recommendations-card [recommendations]="resume.recommendations">

      </app-recommendations-card>

      <!-- Cover Letter -->

      <app-cover-letter-card [coverLetter]="resume.coverLetter">

      </app-cover-letter-card>

    </div>

  </section>

</div>
