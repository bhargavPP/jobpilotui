<div class="card">

  <h2>Skills</h2>

  <div class="section"
       *ngFor="let category of skillCategories">

    <ng-container *ngIf="category.skills.length">

      <h3>{{ category.name }}</h3>

      <div class="chips">

        <span class="chip"
              *ngFor="let skill of category.skills">

          {{ skill }}

        </span>

      </div>

    </ng-container>

  </div>

  <hr>

  <div class="section">

    <h3>Required Skills</h3>

    <div class="chips">

      <span class="chip required"
            *ngFor="let skill of requiredSkills">

        {{ skill }}

      </span>

    </div>

  </div>

  <div class="section">

    <h3>Nice To Have</h3>

    <div class="chips">

      <span class="chip optional"
            *ngFor="let skill of niceToHave">

        {{ skill }}

      </span>

    </div>

  </div>

  <div class="section">

    <h3>ATS Keywords</h3>

    <div class="chips">

      <span class="chip keyword"
            *ngFor="let keyword of keywords">

        {{ keyword }}

      </span>

    </div>

  </div>

  <div class="section">

    <h3>Missing Skills</h3>

    <div class="chips">

      <span class="chip missing"
            *ngFor="let skill of missingSkills">

        {{ skill }}

      </span>

    </div>

  </div>

</div>
