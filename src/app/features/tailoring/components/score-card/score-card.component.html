<div class="score-card">

  <div class="card-header">

    <span class="title">
      {{ title }}
    </span>

    <span class="badge"
          [ngClass]="scoreClass">

      {{ scoreLabel }}

    </span>

  </div>

  <div class="score-wrapper">

    <div class="score-circle"
         [style.--progress]="value">

      <div class="score-value">

        {{ value }}

        <small>%</small>

      </div>

    </div>

  </div>

</div>
