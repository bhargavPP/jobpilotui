<h2 mat-dialog-title>

  {{ data ? 'Edit Experience' : 'Add Experience' }}

</h2>

<mat-dialog-content>

  <form [formGroup]="form">

    <mat-form-field appearance="outline">

      <mat-label>

        Company

      </mat-label>

      <input matInput
             formControlName="company">

    </mat-form-field>

    <mat-form-field appearance="outline">

      <mat-label>

        Job Title

      </mat-label>

      <input matInput
             formControlName="title">

    </mat-form-field>

    <mat-form-field appearance="outline">

      <mat-label>

        Start Date

      </mat-label>

      <input matInput
             type="date"
             formControlName="startDate">

    </mat-form-field>

    <mat-form-field appearance="outline">

      <mat-label>

        End Date

      </mat-label>

      <input matInput
             type="date"
             formControlName="endDate">

    </mat-form-field>

    <h3>

      Responsibilities

    </h3>

    <div formArrayName="bullets">

      @for (bullet of bullets.controls; track $index) {

      <app-bullet-editor [index]="$index"
                         [control]="bullet"
                         (remove)="removeBullet($event)">
      </app-bullet-editor>

      }

    </div>

    <button mat-stroked-button
            type="button"
            (click)="addBullet()">

      <mat-icon>add</mat-icon>

      Add Bullet

    </button>


  </form>

</mat-dialog-content>

<mat-dialog-actions align="end">

  <button mat-button
          (click)="cancel()">

    Cancel

  </button>

  <button mat-flat-button
          color="primary"
          (click)="save()">

    Save

  </button>

</mat-dialog-actions>
