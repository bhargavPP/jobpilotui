<mat-card>

  <mat-card-header>
    <mat-card-title>Skills</mat-card-title>
    <mat-card-subtitle>
      Organize your skills into categories.
    </mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>

    @for (category of skillCategories(); track category.id) {

    <section class="skill-section">

      <div class="category-header">

        <mat-form-field appearance="outline">
          <mat-label>Category</mat-label>

          <input matInput
                 [(ngModel)]="category.name"
                 (ngModelChange)="emitChanges()">
        </mat-form-field>

        <button mat-icon-button
                color="warn"
                (click)="removeCategory(category.id)">

          <mat-icon>delete</mat-icon>

        </button>

      </div>

      <mat-chip-set>

        @for (skill of category.skills; track skill) {

        <mat-chip-row removable
                      (removed)="removeSkill(category.id, skill)">

          {{ skill }}

          <button matChipRemove>
            <mat-icon>cancel</mat-icon>
          </button>

        </mat-chip-row>

        }

      </mat-chip-set>

      <div class="add-row">

        <mat-form-field appearance="outline">

          <mat-label>Add Skill</mat-label>

          <input matInput
                 #skillInput>

        </mat-form-field>

        <button mat-flat-button
                color="primary"
                (click)="addSkill(category.id, skillInput.value); skillInput.value=''">

          Add

        </button>

      </div>

    </section>

    }

    <button mat-stroked-button
            color="primary"
            (click)="addCategory()">

      <mat-icon>add</mat-icon>

      Add Category

    </button>

  </mat-card-content>

</mat-card>
