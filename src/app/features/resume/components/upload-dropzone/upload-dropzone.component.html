<div class="dropzone"
     [class.dragging]="dragging()"
     (dragover)="onDragOver($event)"
     (dragleave)="onDragLeave($event)"
     (drop)="onDrop($event)">

  <mat-icon class="upload-icon">
    cloud_upload
  </mat-icon>

  <h2>Upload your resume</h2>

  <p class="subtitle">
    Drag &amp; drop your <strong>.docx</strong> resume here
    <br />
    or browse your computer.
  </p>

  <input #fileInput
         hidden
         type="file"
         accept=".docx"
         (change)="browse($event)" />

  <button mat-flat-button
          color="primary"
          type="button"
          (click)="fileInput.click()"
          [disabled]="uploading()">

    <mat-icon>upload_file</mat-icon>

    Browse Resume

  </button>

  @if (uploading()) {

  <div class="progress-section">

    <mat-progress-bar mode="determinate"
                      [value]="progress()">
    </mat-progress-bar>

    <span class="progress-text">
      Uploading... {{ progress() }}%
    </span>

  </div>

  }

</div>
