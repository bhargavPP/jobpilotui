<h2 mat-dialog-title>Delete Resume?</h2>

<mat-dialog-content>

  This will permanently delete your resume.

  <br><br>

  You can upload a new one afterwards.

</mat-dialog-content>

<mat-dialog-actions align="end">

  <button mat-button
          (click)="dialogRef.close(false)">

    Cancel

  </button>

  <button mat-flat-button
          color="warn"
          (click)="dialogRef.close(true)">

    Delete

  </button>

</mat-dialog-actions>
